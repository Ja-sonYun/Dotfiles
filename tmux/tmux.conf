set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'ChanderG/tmux-notify'
# set -g @plugin 'sainnhe/tmux-fzf'
# set -g @plugin 'kristijanhusak/tmux-simple-git-status'
# set -g @plugin 'xamut/tmux-network-bandwidth'
# set -g @plugin 'tmux-plugins/tmux-cpu'
# set -g @plugin 'tmux-plugins/tmux-online-status'

# set-environment __CURRENT_SHELL zsh

set-option -sg escape-time 30

# set -g terminal-overrides ",alacritty:RGB"
# set -ga terminal-overrides ",*256col*:Tc"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# panes
set -g pane-border-style 'fg=colour251'
set -g pane-active-border-style 'fg=colour251'
set -g pane-border-lines single
set-option -g default-terminal "screen-256color"

set-option -g status-position top
set -g 'status-format[0]' ''
set -g status-bg default
set -g status-keys vi

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

set -g history-limit 50000
set-option -g status off
set-option -sa terminal-overrides ',xterm-256color:RGB'
set-option -g focus-events on

bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

set -g prefix C-q
bind -n S-left select-pane -L
bind -n S-down select-pane -D
bind -n S-up select-pane -U
bind -n S-right select-pane -R
unbind-key -T prefix C-o
bind E setw synchronize-panes \; display "synchronize-panes #{?pane_synchronized,on,off}"
bind-key -T copy-mode-vi v send -X begin-selection
setw -g mode-keys vi
set-window-option -g mode-keys vi
#macos
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# set -g mouse on
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
# bind -n WheelDownPane select-pane -t= \; send-keys -M

unbind-key -T prefix C-f
unbind-key -T prefix C-e
unbind-key -T prefix C-t
unbind-key -T prefix C-r
unbind-key -T prefix o

TMUX_FZF_LAUNCH_KEY="e"

# bind -r e popup '#{pane_current_path}' -E 'zsh
# bind C-e run-shell "tmuxpopup"
# bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
# is_popup="[[ `tmux display-message -p -F \"#{session_name}\"` == *\"popup\"* ]]"
bind-key f run-shell "$MYDOTFILES/scripts/popup-tmux-sh top"
bind-key C-f run-shell "$MYDOTFILES/scripts/popup-tmux-sh bottom"

bind-key C-r run-shell "$MYDOTFILES/tmux/scripts/swap.sh"
# bind-key C-f run-shell "$MYDOTFILES/scripts/hpopup-tmux-sh"
# bind-key f if-shell -b "$is_popup" \
#     "detach-client" \
#     "run-shell \"$MYDOTFILES/scripts/popup-tmux 'tmux attach -t popup || tmux new -s popup && tmux set status off'\""
# bind-key C-f if-shell -b "$is_popup" \
#     "detach-client" \
#     "run-shell \"$MYDOTFILES/scripts/hpopup-tmux 'tmux attach -t popup || tmux new -s popup && tmux set status off'\""

# bind F popup -E -w80% zsh\; display-message " zsh closed"

bind-key t run-shell "$MYDOTFILES/scripts/popup-tmux gitui"\;
bind-key C-w run-shell "$MYDOTFILES/scripts/popup-wtfutil"\;

# bind-key S rename-session -t #{session_name} asdsad
# bind t popup -E -w80% tig\; display-message " gotop closed"

# bind-key C-K set status

bind-key B display-message '#{cursor_x} #{cursor_y}'

bind-key o run-shell "source $MYDOTFILES/tmux-shortcuts/menu.sh && show_main_menu #{pane_current_path}"

# bind-key k run-shell "$MYDOTFILES/scripts/hover_cover"

# reload config
bind R source-file ~/.tmux.conf \; display-message "Tmux configuration reloaded."

set -g status off
run '$MYDOTFILES/tmux/plugins/tpm'
